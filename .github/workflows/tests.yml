name: Tests

on:
  pull_request:
    branches:
      - master

jobs:
  lint:
    name: Lint & Static Analysis (PHP 8.2)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run lint
        run: composer lint

      - name: Run PHPStan
        run: composer phpstan

  test:
    name: Test (PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: [10, 11, 12, 13]
        include:
          - laravel: 10
            testbench: '^8.0'
          - laravel: 11
            testbench: '^9.0'
          - laravel: 12
            testbench: '^10.0'
          - laravel: 13
            testbench: '^11.0'
        exclude:
          - php: '8.2'
            laravel: 13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Pin Testbench version
        run: composer require "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction

      - name: Run tests
        run: composer test

  coverage:
    name: Coverage (PHP 8.4 - Laravel 13)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: pcov

      - name: Pin Testbench version
        run: composer require "orchestra/testbench:^11.0" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction

      - name: Run tests with coverage
        run: ./vendor/bin/phpunit --coverage-clover coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
